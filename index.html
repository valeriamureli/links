<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Valeria Mureli</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-width: 320px;
			overflow-x: hidden;
			background-color: #ff72b4;
		}

		.app {
			width: 100%;
			max-width: 800px;
			margin: 0 auto;
			position: relative;
			height: 1425px;
		}

		.app img {
			display: block;
			max-width: 100%;
		}

		.instagram {
			position: absolute;
			z-index: 1;
			width: 280px;
			height: 60px;
			top: 560px;
			left: 175px;
		}

		.tiktok {
			position: absolute;
			z-index: 1;
			width: 280px;
			height: 60px;
			top: 400px;
			left: 175px;
		}

		.youtube {
			position: absolute;
			z-index: 1;
			width: 280px;
			height: 60px;
			top: 480px;
			left: 175px;
		}

		.email {
			position: absolute;
			z-index: 1;
			width: 350px;
			height: 60px;
			top: 980px;
			left: 150px;
		}

		@media screen and (max-width: 800px) {
			.app {
				width: 400px;
				height: 900px;
				overflow: hidden;
			}

			.app img {
				width: 400px;
				height: 713px;
				transform: scale(1.3);
				transform-origin: 50% 0%;
			}

			.email {
				position: absolute;
				z-index: 1;
				width: 240px;
				height: 50px;
				top: 627px;
				left: 40px;
			}

			.tiktok {
				position: absolute;
				z-index: 1;
				width: 191px;
				height: 35px;
				top: 260px;
				left: 50px;
			}

			.youtube {
				position: absolute;
				z-index: 1;
				width: 160px;
				height: 35px;
				top: 311px;
				left: 58px;
			}

			.instagram {
				position: absolute;
				z-index: 1;
				width: 140px;
				height: 35px;
				top: 360px;
				left: 60px;
			}
		}
	</style>
</head>

<body>
	<div class="app">
		<img src="img/valerialinks.webp" alt="Valeria Mureli">
		<a class="app-link instagram" href="https://www.instagram.com/valeria.mureli/"></a>
		<a class="app-link tiktok" href="https://www.tiktok.com/@valeria.mureli"></a>
		<a class="app-link youtube" href="https://www.youtube.com/@ValeriaMureli"></a>
		<a class="app-link email" href="mailto:murelivaleria@gmail.com"></a>
	</div>
</body>

</html>
